<!DOCTYPE html>
<html>
<head>
<title>SMI-LE</title>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:10px;
}

.header img{
    width:70px;
}

h2{
    margin:0;
}

/* BOTONES */
.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
}

.btn.danger{
    background:#dc2626;
}

/* TABLA */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
    padding:8px;
}

td{
    border:1px solid #ccc;
    padding:5px;
}

input{
    width:100%;
}

</style>

<script>
function filtrar(){
    let inputs = document.querySelectorAll(".filtro");
    let filas = document.querySelectorAll("#tabla tr");

    filas.forEach((fila, i)=>{
        if(i<3) return;

        let mostrar = true;

        inputs.forEach((input, index)=>{
            let val = input.value.toLowerCase();
            let texto = fila.cells[index].innerText.toLowerCase();

            if(val && !texto.includes(val)){
                mostrar = false;
            }
        });

        fila.style.display = mostrar ? "" : "none";
    });
}
</script>

</head>

<body>

<div class="header">
    <img src="/static/logo.png">
    <h2>BASE DE DATOS SMI-LE</h2>
</div>

<a href="/eliminar_todo">
<button class="btn danger">Eliminar Todo</button>
</a>

<table id="tabla">

<tr>
<th>Expediente</th>
<th>Primer Nombre</th>
<th>Segundo Nombre</th>
<th>Primer Apellido</th>
<th>Segundo Apellido</th>
<th>Identidad</th>
<th>Fecha</th>
<th>Sexo</th>
<th>Departamento</th>
<th>Municipio</th>
<th>Aldea</th>
<th>Acción</th>
</tr>

<tr>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td></td>
</tr>

<form action="/agregar" method="POST">
<tr>
<td><input name="expediente"></td>
<td><input name="p1"></td>
<td><input name="p2"></td>
<td><input name="a1"></td>
<td><input name="a2"></td>
<td><input name="identidad"></td>
<td><input name="fecha"></td>
<td><input name="sexo"></td>
<td><input name="departamento"></td>
<td><input name="municipio"></td>
<td><input name="aldea"></td>
<td><button class="btn">Agregar</button></td>
</tr>
</form>

{% for fila in data %}
<tr>
{% for dato in fila %}
<td>{{dato}}</td>
{% endfor %}
<td>
<a href="/eliminar/{{loop.index0}}">
<button class="btn danger">Eliminar</button>
</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
