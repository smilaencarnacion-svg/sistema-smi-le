<!DOCTYPE html>
<html>
<head>
<title>SMI-LE</title>

<style>
body{font-family:Arial;background:#f1f5f9;}
.header{display:flex;align-items:center;gap:15px;}
.header img{width:70px;}
.btn{background:#2563eb;color:white;border:none;padding:6px;border-radius:4px;}
.btn.danger{background:#dc2626;}
table{width:100%;border-collapse:collapse;}
th{background:#2563eb;color:white;}
td{border:1px solid #ccc;padding:5px;}
input{width:100%;}
</style>

<script>
function filtrar(){
let inputs=document.querySelectorAll(".filtro");
let filas=document.querySelectorAll("#tabla tr");

filas.forEach((fila,i)=>{
if(i<3)return;
let mostrar=true;
inputs.forEach((input,index)=>{
let val=input.value.toLowerCase();
let texto=fila.cells[index].innerText.toLowerCase();
if(val && !texto.includes(val)) mostrar=false;
});
fila.style.display=mostrar?"":"none";
});
}

function editarFila(btn){
let fila=btn.closest("tr");
let inputs=fila.querySelectorAll("input");
inputs.forEach(i=>i.removeAttribute("readonly"));
btn.style.display="none";
fila.querySelector(".guardar").style.display="inline";
fila.querySelector(".cancelar").style.display="inline";
}

function cancelar(){location.reload();}
</script>

</head>

<body>

<div class="header">
<img src="/static/logo.png">
<h2>BASE DE DATOS SMI-LE</h2>
</div>

<br>

<form action="/importar" method="POST" enctype="multipart/form-data">
<input type="file" name="archivo">
<button class="btn">Importar Excel</button>
</form>

<a href="/exportar"><button class="btn">Descargar Excel</button></a>
<a href="/eliminar_todo"><button class="btn danger">Eliminar Todo</button></a>

<table id="tabla">

<tr>
<th>ID</th>
<th>Expediente</th>
<th>Nombre</th>
<th>Acción</th>
</tr>

<tr>
<td></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td><input class="filtro" onkeyup="filtrar()"></td>
<td></td>
</tr>

<form action="/agregar" method="POST">
<tr>
<td></td>
<td><input name="expediente"></td>
<td><input name="p1"></td>
<td><button class="btn">Agregar</button></td>
</tr>
</form>

{% for fila in data %}
<tr>
<form action="/editar/{{fila[0]}}" method="POST">

<td>{{fila[0]}}</td>
<td><input name="expediente" value="{{fila[1]}}" readonly></td>
<td><input name="p1" value="{{fila[2]}}" readonly></td>

<td>
<button type="button" onclick="editarFila(this)">Editar</button>
<button type="submit" class="guardar" style="display:none;">Guardar</button>
<button type="button" class="cancelar" onclick="cancelar()" style="display:none;">Cancelar</button>

<a href="/eliminar/{{fila[0]}}">
<button type="button" class="btn danger">Eliminar</button>
</a>
</td>

</form>
</tr>
{% endfor %}

</table>

</body>
</html>
